name: CI
# spec:E1 已让沙箱测试在 Linux 上能跑(bwrap 在就真跑、不在就干净 skip);
# 装 bwrap 让 CI 不退化成全 skip。E2 gate:本 workflow 同时作为 reusable workflow 被
# release.yml / publish.yml 调,做发布前门禁(CI 不绿就不打 tag 资产 / 不发 PyPI)。
on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

# 同一分支新 push 自动取消旧 run,省 CI 分钟;workflow_call 触发的不限(避免误杀 release gate)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}

permissions:
  contents: read

jobs:
  test:
    name: Full test suite (Linux + bwrap sandbox)
    runs-on: ubuntu-latest
    # E1 守卫:requires_sandbox fixture 在 linux 上要 bwrap 或 unshare。
    # apt 包 bubblewrap 即提供 /usr/bin/bwrap(无它则 conftest 走 pytest.skip,沙箱真测
    # 全没跑,CI 退化为"Linux 上假装全过"——违反诚实协议)。
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install bubblewrap (enables real sandbox tests on Linux)
        run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - name: Enable + probe unprivileged sandbox (bwrap user-ns / loopback)
        # ubuntu-latest 自 24.04 起设 kernel.apparmor_restrict_unprivileged_userns=1:
        # bwrap 能建 user-ns(故走到 loopback 这步),但配 loopback 所需的 CAP_NET_ADMIN
        # 被 AppArmor 剥掉 → "--unshare-net" 时 "loopback: RTM_NEWADDR Operation not permitted",
        # 连带所有真沙箱测试硬挂。关掉该限制即恢复 user-ns 内的能力。本步骤打印证据 + 探测
        # bwrap/unshare 是否可用(不 fail job,让下方测试步骤跑出真实结果)。
        run: |
          set -x
          bwrap --version || true
          echo "apparmor_restrict_unprivileged_userns (before):"
          cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || echo "(sysctl absent)"
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          echo "--- bwrap net-isolated probe (mirrors _bwrap_argv init) ---"
          if bwrap --unshare-pid --unshare-ipc --unshare-user --uid 0 --gid 0 \
                   --unshare-uts --die-with-parent --unshare-net \
                   --ro-bind / / --dev /dev --proc /proc --tmpfs /tmp -- /bin/true; then
            echo "PROBE: bwrap-netns OK"
          else
            echo "PROBE: bwrap-netns FAILED"
          fi
          echo "--- unshare net-isolated probe (fallback viability) ---"
          if unshare --user --map-root-user --net --pid --mount --fork -- /bin/true; then
            echo "PROBE: unshare-netns OK"
          else
            echo "PROBE: unshare-netns FAILED"
          fi
      - name: Run full test suite
        # 全量 `uv run pytest -q` —— pyproject 里 addopts 强制 --cov=argos
        # --cov-fail-under=80,所以这是覆盖门 + 沙箱真跑的统一验证。
        run: uv run pytest -q
