name: Release
# spec §10:打 v* tag → 3 OS 矩阵 jobs → release job 走 `gh release create` 跨资产发布。
# 修 v0.1.0 时的 0 jobs bug:pin `actions/setup-python@v4`(B 阶段用 @v5 偶发 validator 报 0 jobs);
# 替换 `softprops/action-gh-release@v2` 为 `gh release create`(免 softprops Node 20 + token 解析)。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # E2 发布门禁:tag 触发后先跑全量测试,失败则所有 build-* 与 release job 全部 skip,
  # 资产不打、release 不创建 → bump-homebrew / bump-winget 也不会被 release.published 触发。
  test:
    name: CI gate (full test suite, Linux + bwrap)
    uses: ./.github/workflows/ci.yml

  build-macos:
    name: Build macOS arm64
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install deps
        run: uv sync
      - name: Build macOS arm64
        env:
          ARGOS_VERSION: ${{ github.ref_name }}
        run: bash packaging/build_arm64.sh
      - name: Pack macOS tarball + sha256
        env:
          ARGOS_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${ARGOS_VERSION#v}"
          cd dist
          tar czf "Argos-${VERSION}-arm64-mac.tar.gz" -C "Argos.app/.." "Argos.app"
          shasum -a 256 "Argos-${VERSION}-arm64-mac.tar.gz" > "SHA256SUMS"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/

  build-linux:
    name: Build Linux (AppImage/.deb/.rpm)
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm fuse wget libfuse2
      - name: Build Linux
        env:
          ARGOS_VERSION: ${{ github.ref_name }}
        run: bash packaging/build_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/

  build-windows:
    name: Build Windows (.exe/.msi)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Build Windows
        env:
          ARGOS_VERSION: ${{ github.ref_name }}
        run: bash packaging/build_windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/

  release:
    name: Create GitHub release
    needs: [test, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
      - name: Generate final SHA256SUMS
        working-directory: dist
        run: sha256sum -- * > SHA256SUMS || true
      - name: Create GitHub release (gh release create)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # 找所有 release 资产(过滤 SHA256SUMS)
          ASSETS=$(find dist -type f \
            \( -name "*.tar.gz" -o -name "*.AppImage" -o -name "*.deb" \
               -o -name "*.rpm" -o -name "*.zip" -o -name "*.msi.zip" \
               -o -name "SHA256SUMS" \) \
            | sed 's|^dist/||')
          echo "Release assets:"
          echo "$ASSETS"
          # 走 gh release create(spec §10.2 替换 softprops);--generate-notes 自动产 release notes
          gh release create "v${VERSION}" \
            --title "Argos v${VERSION}" \
            --generate-notes \
            --repo "${{ github.repository }}" \
            $(echo "$ASSETS" | xargs -I{} echo "dist/{}")
